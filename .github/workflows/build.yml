# 全端(Rust + React + Tauri)构建 → Windows/Linux 绿色包 + Android TV APK → 预发布。
#
# 这个文件曾经叫 "Build Flutter",构建 Android 手机/TV 两个 APK。现在 PC 端已迁到
# Rust 栈,苹果全线不做 —— 那两个 job 连同它们依赖的 build-libmpv-pgs.yml 一起删了。
#
# 2026-07-19 全面重构:Flutter/Dart 全删、原 native-poc/ 提到仓库根(apps/ + ui/ +
# crates/),那批自建的 jniLibs/*.so 也一并删除(要翻旧账:git tag flutter-final)。
# 2026-07-20 加回安卓:apps/android 建起来了,job 在下面 build-android。
# ★ 它跑 **ubuntu** 而不是 windows —— scripts/build-android.sh 里那一大堆
#   libclang/resource-dir/vcvars 的折腾全是 **Windows 宿主特有**的(rquickjs-sys 要现生成
#   FFI bindings,而 libclang 当 DLL 加载时找不到自己的 builtin 头)。Linux 上交叉编译
#   安卓没这些坑,runner 还便宜一半。别照着那个脚本往 windows runner 上搬。
#
# 发布链路:本 workflow 出 v<ver>-pre 预发布(= App 内的「预览版」渠道),
# publish.yml 手动把它提升成正式 Release(= 「稳定版」渠道)。两个渠道的定义
# 就落在这两个文件上,别在别处再造一套。
name: Build

on:
  push:
    branches: [ main, master ]
    # 只有 PC 端的东西改了才值得烧一个 windows runner(计费 2 倍)。
    # 原 native-poc/ 已于 2026-07-19 提到仓库根;这里只列 PC 端真正的构建输入。
    paths:
      - 'apps/desktop/**'
      - 'apps/android/**'
      - 'crates/**'
      - 'ui/**'
      - 'public/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'index-tv.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'apps/desktop/**'
      - 'apps/android/**'
      - 'crates/**'
      - 'ui/**'
      - 'public/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'index-tv.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号(如 1.0.0)。留空=取 tauri.conf.json 的 version + -build<run_number>'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # 版本号单独算一次,Windows 和 Linux 两个 job 都引用它。
  # ★ 不让两端各算一遍:那样 run_number 虽同,但只要哪天算法改了一半就会打出两个
  #   版本号不一致的包,而更新器是按版本号比大小的 —— 这种漂移不会报错,只会让
  #   某一端永远检测不到新版本。唯一权威只能有一个。
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      # 版本口径:tauri.conf.json 是 PC 端版本的唯一权威(打包脚本拿它命名 zip,
      # build.rs 拿它注入 Sentry release,vite 拿它做 sourcemap release)。
      # 加 -build<run_number> 是为了让**每次预发布都比上一次大** —— App 内的更新
      # 比较逻辑正是按 major.minor.patch.build 逐级比的,不加就永远检测不到新预览版。
      - id: v
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then
            BASE=$(node -p "require('./apps/desktop/tauri.conf.json').version")
            V="$BASE-build${{ github.run_number }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "version = $V"

  build-windows:
    name: Build Windows portable
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # 不需要 lfs:LFS 里放的是 Android 的 libmpv.so,PC 端一个字节都不用。

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # ★ 不能降到 22 以下:下面那步 `npm run check:telemetry` 是让 node 直接跑
          # src/telemetry.check.ts(类型擦除,换来「零测试框架」)。Node 20 不支持,
          # 报 ERR_UNKNOWN_FILE_EXTENSION ".ts" —— 本次就是这么红的第一轮。
          # 类型擦除在 22.18+ 默认开、24 默认开;这里钉 24,和本地验证过的大版本一致。
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      # 完整版 libmpv。100MB+,不进仓库(.gitignore),所以每次构建现拉。
      # 这段逻辑原先住在 build-libmpv-pgs.yml 的 assemble-windows-libmpv job 里,
      # 那个 workflow 删了,逻辑搬到这儿 —— 少一次跨 workflow 的产物传递,也少一个
      # 「上游 workflow 半年没跑过、libmpv-latest 早就过期」的失败面。
      #
      # 为什么必须是 shinchiro 的完整构建:自带完整 ffmpeg,含 PGS/SUP 图形字幕解码器
      # (hdmv_pgs_subtitle)。精简版 libmpv 能编译、能播放、蓝光字幕一片空白。
      # ★ 这步任何一环失败都必须让 job 红:少了 DLL,exe 照样编得出来、照样打得成包,
      #   用户双击才发现「找不到 libmpv-2.dll」。
      - name: Fetch full libmpv (shinchiro mpv-dev)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' } | Select-Object -First 1
          if (-not $asset) { throw "shinchiro 最新 release 里没有 mpv-dev-x86_64 资产" }
          Write-Host "source: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev | Out-Null
          $dll = Get-ChildItem mpv-dev -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { throw "压缩包里没有 libmpv-2.dll" }
          Copy-Item $dll.FullName apps/desktop/libmpv/libmpv-2.dll -Force
          $size = (Get-Item apps/desktop/libmpv/libmpv-2.dll).Length
          Write-Host "libmpv-2.dll size: $size"
          if ($size -lt 60MB) { throw "libmpv-2.dll 只有 $size 字节,不是完整版" }

      # 把本次构建的版本号写回 tauri.conf.json。不写的话 Sentry 上所有构建都挤在
      # linplayer-pc@0.1.0 一个 release 下,符号/sourcemap 互相覆盖;App 内的
      # 「当前版本」也永远显示 0.1.0,更新检查一律认为自己是最新的。
      - name: Stamp version into tauri.conf.json
        shell: pwsh
        run: |
          $p = "apps/desktop/tauri.conf.json"
          $c = (Get-Content $p -Raw) -replace '("version"\s*:\s*")[^"]*(")', '${1}${{ needs.version.outputs.version }}${2}'
          Set-Content $p -Value $c -NoNewline -Encoding utf8NoBOM
          Select-String -Path $p -Pattern '"version"'

      - name: Install frontend deps
        run: npm ci

      - name: Check telemetry redaction
        run: npm run check:telemetry

      - name: Rust tests
        run: cargo test --workspace

      # 前端 sourcemap 由 @sentry/vite-plugin 在 beforeBuildCommand 里顺手上传
      # (它自己读 SENTRY_AUTH_TOKEN;没 token 就整个不挂,有 token 而传失败则构建红)。
      - name: Build
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx tauri build

      # Rust 侧的符号。前端那半上面已经传了,但 MSVC 的函数名/行号在 app.pdb 里,
      # 而发行包只装 exe —— 不传的话用户机器上的 panic 回来就是一列十六进制地址。
      # ★ 判断写在脚本里,不写成 `if: ${{ secrets.X != '' }}` —— GitHub 不给 step 的
      #   if: 表达式访问 secrets 上下文,那样写会直接跳过或报错(本仓上次接 Sentry 踩过)。
      - name: Upload Rust debug symbols to Sentry
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if (-not $env:SENTRY_AUTH_TOKEN) {
            Write-Host "::notice::SENTRY_AUTH_TOKEN 未设置,跳过符号上传(崩溃堆栈将无法符号化)"
            exit 0
          }
          $cli = "node_modules/@sentry/cli-win32-x64/bin/sentry-cli.exe"
          if (-not (Test-Path $cli)) { throw "sentry-cli 不在,npm ci 装漏了?" }
          # project 必须是 DSN 所指的那个(slug 叫 flutter,历史原因:移动端先建的)。
          # 传到别的项目**两边都不报错**,symbolication 却永远不发生。
          # 不加 --include-sources:那会把 Rust 源码上传到 Sentry,与 Dart 侧
          # upload_sources: false 保持同一条口径。
          & $cli debug-files upload --org linplayer --project flutter `
            target/release/app.pdb target/release/LinPlayer.exe
          if ($LASTEXITCODE -ne 0) { throw "符号上传失败(exit $LASTEXITCODE)" }

      # 自己组包,**不复用本地的 scripts/pack-portable.ps1** —— 那个脚本被
      # .gitignore 明确排除(用户 2026-07-15 定的「本地工作材料不入库」),
      # CI 检出的树里根本没有它。它做的也多半是开发环路的事(读 hjbl.env、解压到
      # 测试目录、保留 userdata),CI 只需要「exe + dll → zip」这一步。
      #
      # ★ 发行包内容改动时,这里和 pack-portable.ps1 要一起改 —— 下面的清单断言
      #   保证 CI 这半至少不会静默少装文件。
      - name: Pack portable zip
        shell: pwsh
        run: |
          $rel = "target/release"
          # mainBinaryName 已让 tauri 直接产出 LinPlayer.exe(crate 名仍是 app,故 pdb 还叫 app.pdb)。
          $exe = "$rel/LinPlayer.exe"
          $dll = "$rel/libmpv-2.dll"   # build.rs 会把它从 apps/desktop/libmpv/ 拷过来
          foreach ($f in @($exe, $dll)) {
            if (-not (Test-Path $f)) { throw "缺少产物 $f" }
          }
          $stage = "pack/LinPlayer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # 应用内更新的 applier 按 LinPlayer.exe 这个名字找主程序。
          Copy-Item $exe "$stage/LinPlayer.exe" -Force
          Copy-Item $dll "$stage/libmpv-2.dll" -Force

          $want = @("LinPlayer.exe", "libmpv-2.dll")
          $got  = (Get-ChildItem $stage -File | ForEach-Object Name | Sort-Object)
          if (Compare-Object $want ($got) ) {
            throw "发行包内容对不上。期望 $($want -join ', ');实得 $($got -join ', ')"
          }

          # 命名必须让 App 的更新器认得出来:它按小写子串 "windows" 挑资产。
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $zip = "release/LinPlayer-Windows-v${{ needs.version.outputs.version }}.zip"
          Compress-Archive -Path (Get-ChildItem -LiteralPath $stage).FullName -DestinationPath $zip -CompressionLevel Optimal
          "zip: $zip  $([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*.zip
          retention-days: 7

  build-linux:
    name: Build Linux portable
    needs: version
    # ★ 钉 22.04,不用 ubuntu-latest。glibc 是**向后兼容、不向前兼容**的:在 24.04
    #   (glibc 2.39)上链出来的二进制,拿到 Debian 12 / Ubuntu 22.04 上就是
    #   `GLIBC_2.38 not found`,起都起不来。用老的构建 = 覆盖面更广。
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Tauri v2 在 Linux 上是 GTK3 + WebKitGTK 4.1(不是 4.0,别装错包名)。
      #
      # ★ 这里**故意不装 libmpv-dev**:libmpv 是运行时 dlopen 的(见 apps/desktop/src/mpv.rs
      #   的 `mod ffi`)。装了反而有害 —— 一旦哪天有人给 build.rs 加回 link-lib,
      #   构建机上有 .so 就会「碰巧编过」,而 ELF 里被钉进一条 libmpv.so.1 的 DT_NEEDED,
      #   包发到 Ubuntu 24.04(只有 libmpv.so.2)上直接起不来。让构建机没有这个库,
      #   这类回归就不可能悄悄溜过去。
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxrandr-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Stamp version into tauri.conf.json
        run: |
          node -e '
            const fs = require("fs"), p = "apps/desktop/tauri.conf.json";
            const c = JSON.parse(fs.readFileSync(p, "utf8"));
            c.version = "${{ needs.version.outputs.version }}";
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          '
          grep '"version"' apps/desktop/tauri.conf.json

      - name: Install frontend deps
        run: npm ci

      - name: Rust tests
        run: cargo test --workspace

      - name: Build
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx tauri build

      # 和 Windows 那半同一条口径:不传符号的话,Linux 用户回来的 panic 就是一列
      # 十六进制地址,遥测等于白接。根 Cargo.toml 的 debug="line-tables-only" 在 ELF 上
      # 是把行号表放进二进制本身,所以直接把二进制交给 sentry-cli 就够了(不像 MSVC 要另找 pdb)。
      # ★ 判断写在脚本里,不写成 `if: ${{ secrets.X != '' }}` —— GitHub 不给 step 的
      #   if: 表达式访问 secrets 上下文。
      - name: Upload Rust debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN 未设置,跳过符号上传(崩溃堆栈将无法符号化)"
            exit 0
          fi
          CLI=node_modules/@sentry/cli-linux-x64/bin/sentry-cli
          test -x "$CLI" || { echo "sentry-cli 不在,npm ci 装漏了?"; exit 1; }
          # project 必须是 DSN 所指的那个(slug 叫 flutter,历史原因:移动端先建的)。
          # 传到别的项目**两边都不报错**,symbolication 却永远不发生。
          # 产物名跟 tauri.conf.json 的 mainBinaryName 走(= LinPlayer),不是 crate 名 app。
          "$CLI" debug-files upload --org linplayer --project flutter target/release/LinPlayer

      # 打包成 **zip**(不是 Linux 更习惯的 tar.gz):应用内更新器解包走的是
      # core/update.rs 的 extract_zip,喂它 tar.gz 会当场失败。格式必须和更新链路一致。
      # 资产名必须含小写子串 "linux" —— update.rs 的 asset_keywords() 就按这个挑。
      #
      # 不打包 libmpv.so:构建机那份会连带一串特定版本的 ffmpeg/libass 依赖,而
      # build.rs 写的 `$ORIGIN` rpath 会让**自带的那份永远优先于系统的**。在别的发行版上
      # 那就从「用系统上好好的库」变成「用一个依赖对不上的库」,反而更坏。
      # 用户想自带,把 libmpv.so.2 丢进解压目录即可 —— rpath 已经给他留好了这条路。
      - name: Pack portable zip
        run: |
          set -euo pipefail
          # ★ 名字来自 tauri.conf.json 的 mainBinaryName,**不是** crate 名(app)。
          #   d9a24706 加 mainBinaryName 时只同步了 Windows job,这里漏了 —— Windows 绿、
          #   Linux 在打包步骤炸「缺少产物」(还在找 crate 名那个)。
          #   有 cargo test ci_binary_paths_match_main_binary_name 钉住两边一致。
          BIN=target/release/LinPlayer
          test -f "$BIN" || { echo "缺少产物 $BIN"; exit 1; }

          # ★ strip 必须排在上面那步 Sentry 符号上传**之后**:调试信息已经传走了,
          #   符号化靠 build-id 匹配,和本地这份二进制里还留不留调试段无关。
          #   不 strip 的代价是实的 —— 根 Cargo.toml 的 debug="line-tables-only" 那句注释
          #   「exe 体积不变」只对 MSVC 成立(它的调试信息全在独立的 .pdb 里),
          #   ELF 是把调试段**塞进二进制本身**的。实测未 strip 191MB。
          echo "strip 前: $(du -h "$BIN" | cut -f1)"
          strip --strip-debug "$BIN"
          echo "strip 后: $(du -h "$BIN" | cut -f1)"
          # 回读 rpath,确认 build.rs 那条 $ORIGIN 真的写进 ELF 了(写不进去不会报错,
          # 只是用户自带 libmpv 的那条路静默失效)。
          readelf -d "$BIN" | grep -E 'RUNPATH|RPATH' || echo "::warning::ELF 里没有 RUNPATH"

          # ★ 反向断言:libmpv **绝不能**出现在 DT_NEEDED 里。
          #   出现了就说明有人把它变回了链接期依赖,而那会把某个具体 soname
          #   (构建机上是 libmpv.so.1)钉死进 ELF —— 包在 Ubuntu 24.04 等只有
          #   libmpv.so.2 的系统上一启动就死,而 CI 全绿、本机也照跑。必须在这儿拦住。
          if readelf -d "$BIN" | grep -q 'NEEDED.*libmpv'; then
            echo "libmpv 被链成了硬依赖(DT_NEEDED),应当是运行时 dlopen"; exit 1
          fi
          # 正向断言:dlopen 的候选名确实编进了二进制。
          grep -q 'libmpv\.so\.2' "$BIN" || { echo "二进制里找不到 dlopen 候选名"; exit 1; }

          # 把硬依赖清单打进日志。这不是装饰:发行包的「系统下限」完全由这张表决定
          # (libwebkit2gtk-4.1 那条就把下限钉在 Ubuntu 22.04 / Debian 12)。
          # 谁哪天引入了新的 DT_NEEDED,这里一眼可见,不用等用户报「装了却起不来」。
          echo "--- DT_NEEDED(运行时硬依赖,决定系统下限) ---"
          readelf -d "$BIN" | sed -n 's/.*NEEDED.*\[\(.*\)\]/  \1/p'
          # webkit 是 Tauri 在 Linux 的地基,没有它说明构建方式变了,必须当场知道。
          readelf -d "$BIN" | grep -q 'libwebkit2gtk-4\.1' || {
            echo "::warning::没有链接 libwebkit2gtk-4.1,发行说明里的系统下限可能已过时"; }

          STAGE=pack/LinPlayer
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/LinPlayer"
          chmod +x "$STAGE/LinPlayer"
          cat > "$STAGE/README.txt" <<'EOF'
          LinPlayer(Linux 免安装版 x86_64)

          运行:./LinPlayer      (若提示没有权限:chmod +x LinPlayer)

          ── 系统依赖 ────────────────────────────────────────────────
          「免安装」指的是**数据**全在本目录,不是自带全部运行库。
          本程序对系统库是硬依赖,缺哪个就报 "libxxx.so.N: cannot open shared
          object file",跟播放器设置无关。

          1) 桌面运行库(Tauri 在 Linux 上就是 GTK3 + WebKitGTK):
             Debian/Ubuntu : sudo apt install libwebkit2gtk-4.1-0 libgtk-3-0 libsoup-3.0-0
             Fedora        : sudo dnf install webkit2gtk4.1 gtk3 libsoup3
             Arch          : sudo pacman -S webkit2gtk-4.1 gtk3 libsoup3

             ⚠ 必须是 webkit2gtk 4.1(配 libsoup3),不是 4.0。
               这决定了系统下限:Ubuntu >= 22.04 / Debian >= 12 / Fedora >= 36。

          2) libmpv(本包不自带):
             Debian/Ubuntu : sudo apt install libmpv2      (旧版本叫 libmpv1)
             Fedora        : sudo dnf install mpv-libs
             Arch          : sudo pacman -S mpv

             运行时 dlopen,libmpv.so.2 / .so.1 都认。想自带某个版本,把
             libmpv.so.2 放进本目录即可(已配 $ORIGIN rpath,同级优先于系统库)。

          ── 显示服务器 ──────────────────────────────────────────────
          需要 X11 且需要合成器(现代桌面环境默认都开)。
          Wayland 会话下自动经 XWayland 运行 —— 视频窗口须由程序自己定位,
          而 Wayland 协议不提供该能力。

          ── 数据 ────────────────────────────────────────────────────
          全部保存在本目录的 userdata/ 下,删除整个文件夹即完成卸载。
          EOF

          mkdir -p release
          ZIP="$PWD/release/LinPlayer-Linux-v${{ needs.version.outputs.version }}.zip"
          (cd pack && zip -r -9 "$ZIP" LinPlayer)
          ls -lh "$ZIP"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*.zip
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Android TV APK。
  #
  # ★ 跑 ubuntu 不跑 windows:见文件头的说明,交叉编译安卓的那堆 libclang 坑是
  #   Windows 宿主特有的,Linux 上没有,而且 windows runner 计费 2 倍。
  # ★ 版本号跟 PC 用**同一个** version job 的输出 —— 安卓有自己的 tauri.conf.json,
  #   不从同一个源头盖进去的话,两端会打出版本号不一致的包。更新器按版本号比大小,
  #   这种漂移不报错,只会让某一端永远收不到更新(PC 端已经栽过一次)。
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android TV APK
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ★ 安卓 job 也要装 Linux 的 GTK/webkit 开发包。
      #   反直觉但必须:APK 是交叉编译到 aarch64-linux-android 的,**不需要**这些;
      #   但下面的 `cargo test -p linplayer-android` 是编到**宿主**(x86_64 linux)跑的,
      #   而 tauri 在 Linux 宿主上要链 glib/gtk/webkit。
      #   不装的表现是 `failed to run custom build command for glib-sys` ——
      #   报错指向 glib,和"安卓"三个字毫无关系,很容易往交叉编译上瞎找。
      #   (Windows 本地不报:那边的 tauri 不需要 GTK。典型的本地过 ≠ CI 过。)
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y             libwebkit2gtk-4.1-dev             libgtk-3-dev             librsvg2-dev             libayatana-appindicator3-dev             libxrandr-dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # NDK:ubuntu runner 自带若干版本,ANDROID_NDK_LATEST_HOME 指向最新的那个。
      # 不写死版本号 —— 写死了 runner 镜像一升级就找不到目录,而且报错很难看懂。
      - name: Resolve NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "NDK = $ANDROID_NDK_LATEST_HOME"
          ls "$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" | head -3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: android

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # 版本号盖进安卓自己的 tauri.conf.json(权威仍是 version job 的输出)。
      - name: Stamp version into android tauri.conf.json
        run: |
          node -e '
            const fs = require("fs"), p = "apps/android/tauri.conf.json";
            const c = JSON.parse(fs.readFileSync(p, "utf8"));
            c.version = "${{ needs.version.outputs.version }}";
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          '
          grep '"version"' apps/android/tauri.conf.json

      - name: Install frontend deps
        run: npm ci

      # 前端必须先出 dist —— 安卓壳的 frontendDist 指向它,且 TV 走的是 index-tv.html。
      - name: Build frontend
        run: |
          npm run build
          test -f dist/index-tv.html || { echo "::error::dist/index-tv.html 不存在,TV 入口没打进产物"; exit 1; }

      # 签名密钥是可选的。
      # ★ 不能把 secrets 写进 step 的 if: —— 那个上下文里读不到 secrets,条件恒假,
      #   步骤会被静默跳过(本仓库在 Sentry 那次已经踩过一模一样的坑)。
      #   正确做法是在 run 里读 env,把结果写成 output 供后续步骤判断。
      - name: Detect signing key
        id: signing
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE" ]; then echo "have=yes" >> "$GITHUB_OUTPUT"; echo "有签名密钥 → 出 release APK";
          else echo "have=no" >> "$GITHUB_OUTPUT"; echo "无签名密钥 → 出 debug APK(debug 签名,可直接安装)"; fi

      # gen/android 入库的话就跳过 init;没入库则现生成。两种都能跑。
      - name: Android init (if needed)
        run: |
          if [ ! -d apps/android/gen/android ]; then
            (cd apps/android && npx tauri android init --skip-targets-install)
          else
            echo "gen/android 已在仓库中,跳过 init"
          fi

      # ⚠️ 只写 keystore.properties **还不够**:Tauri 生成的 build.gradle.kts 默认不读它,
      #    要真出签名包,得在 gen/android/app/build.gradle.kts 里加 signingConfigs 并引用。
      #    目前仓库没有 ANDROID_KEYSTORE_BASE64 这个 secret,走的是下面的 debug 分支
      #    (debug 签名同样可以安装),等真要发正式版再补 gradle 那半。
      - name: Write keystore
        if: steps.signing.outputs.have == 'yes'
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p apps/android/gen/android
          echo "$KEYSTORE" | base64 -d > "$RUNNER_TEMP/lp.keystore"
          cat > apps/android/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/lp.keystore
          storePassword=$KS_PASS
          keyAlias=$KEY_ALIAS
          password=$KEY_PASS
          EOF
          echo "keystore.properties 已写入"

      # ★ 命令对账:tv-commands.txt × generate_handler! × ui/shared/api.ts 三方比对。
      #   漏注册一个命令,构建照样绿,用户走到那个页面才报 command not found ——
      #   这条测试把那种失败提前到 CI。(本地反向验证过:注释掉 list_favorites 立刻红。)
      - name: Command registration test
        run: cargo test -p linplayer-android

      - name: Build APK
        env:
          # ★ 关掉行号表,只对安卓这次构建生效。
          #   根 Cargo.toml 的 [profile.release] debug="line-tables-only" 是为 Windows 上的
          #   Sentry 加的 —— MSVC 把调试信息全放进独立 .pdb,exe 体积**不变**,那笔账划算。
          #   ELF 不是:调试信息留在 .so 里一起进 APK。实测 105MB → 21MB。
          #   用 CARGO_PROFILE_* 而不改 Cargo.toml:那是全 workspace 的,改了会把桌面的
          #   崩溃报告打回「只知道在哪个函数」。cargo profile 没有 per-target 覆盖,
          #   只能在调用侧按住 —— scripts/build-android-apk.sh 里是同一条,改要一起改。
          CARGO_PROFILE_RELEASE_DEBUG: "false"
        run: |
          # ★ 必须 cd 进 apps/android:仓库里现在有**两个** tauri.conf.json
          #   (apps/desktop 和 apps/android),CLI 自动发现会挑到哪个不确定。
          #   在哪个目录跑就用哪个配置,这是唯一不含糊的写法。
          cd apps/android
          if [ "${{ steps.signing.outputs.have }}" = "yes" ]; then
            npx tauri android build --apk --target aarch64
          else
            npx tauri android build --apk --debug --target aarch64
          fi

      # 产物路径在 tauri 版本之间变过,不写死 —— 找出来再改名,找不到就明确报错,
      # 而不是让后面的 upload 拿着空 glob 静默成功。
      - name: Collect APK
        run: |
          mkdir -p release
          APK=$(find apps/android/gen/android -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::没找到 APK 产物"; find apps/android/gen/android -name "*.apk" -o -name "*.aab" | head -20; exit 1
          fi
          cp "$APK" "release/LinPlayer-TV-${{ needs.version.outputs.version }}-arm64.apk"
          ls -lh release/
          # ★ 体积闸门。上面那个 CARGO_PROFILE_RELEASE_DEBUG 一旦失效(改错、被别处覆盖),
          #   APK 会从 21MB 悄悄涨回 105MB —— 构建照样绿,只有用户下载时才发现。
          #   正常 21MB,闸门放到 60MB:既能兜住"调试信息回来了"这种量级的回归,
          #   又不会因为正常加功能就误报。
          SZ=$(stat -c%s release/*.apk)
          echo "APK 体积: $((SZ/1024/1024)) MB"
          if [ "$SZ" -gt 62914560 ]; then
            echo "::error::APK $((SZ/1024/1024))MB 超过 60MB 闸门 —— 多半是 CARGO_PROFILE_RELEASE_DEBUG 没生效,调试信息又被打进 .so 了"
            exit 1
          fi

      # ★ Android TV 专属校验:没有 LEANBACK_LAUNCHER,应用**在 TV launcher 上根本不出现**
      #   ——「装上了但找不到」是最难自查的一类失败,所以在 CI 里硬断言。
      - name: Assert Android TV manifest
        run: |
          M=apps/android/gen/android/app/src/main/AndroidManifest.xml
          grep -q "LEANBACK_LAUNCHER" "$M" || { echo "::error::AndroidManifest 缺 LEANBACK_LAUNCHER,APK 装上后不会出现在 TV 桌面"; exit 1; }
          grep -q "android.software.leanback" "$M" || { echo "::error::AndroidManifest 缺 leanback uses-feature"; exit 1; }
          grep -q "android.hardware.touchscreen" "$M" || { echo "::error::AndroidManifest 没声明 touchscreen 非必需,TV 设备会被 Play 判为不兼容"; exit 1; }
          echo "TV manifest 校验通过"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release/*.apk
          retention-days: 7

  create-prerelease:
    name: Create Pre-release
    needs: [version, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ./artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: ls -lah ./artifacts/

      # App 的更新器下载完会拿这个文件校验 SHA256(找不到就跳过校验,所以它必须在)。
      - name: Generate SHA256 checksums
        run: |
          cd ./artifacts
          rm -f SHA256SUMS
          for f in *; do [ -f "$f" ] && sha256sum "$f"; done > SHA256SUMS
          echo "Generated SHA256SUMS:"; cat SHA256SUMS

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}-pre
          name: v${{ needs.version.outputs.version }} (Pre-release)
          prerelease: true
          files: ./artifacts/*
          generate_release_notes: true
