name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号(如 1.0.0，需对应已存在的 *-pre 预发布)；留空=自动取最新 pre'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Promote Pre-release to Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version (input or latest pre-release)
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ inputs.version }}"
          if [ -z "$VER" ]; then
            echo "未指定版本，自动选取版本号最大的预发布(*-pre)…"
            # ★ 不能用 `.[0].tagName` —— GitHub 返回的顺序**不可依赖**,没写进文档也不自洽。
            #   2026-07-19 实测反证:v1.0.0-build557-pre 排第 1,而 v0.1.0-build566-pre
            #   的 id / created_at / published_at 三个键都更大更晚,却排在后面。
            #   照抄顺序 = 把更旧的包提升成正式版,**降级伪装成升级**,而且一发就是全量用户。
            #   crates/core/src/update.rs 里的 pick_newest_release 早就因为同一个坑改成
            #   「按版本号取最大」了,这里是同一条链路上漏掉的另一半。
            #   排序键:major/minor/patch/build 各补零到 10 位后字典序倒排。
            TAG=$(gh release list --repo "${{ github.repository }}" --limit 100 \
              --json tagName,isPrerelease \
              --jq 'map(select(.isPrerelease))|.[].tagName' \
              | awk '{
                  t=$0; v=t; sub(/^v/,"",v); sub(/-pre$/,"",v);
                  b=0;
                  if (match(v,/-build[0-9]+$/)) { b=substr(v,RSTART+6); sub(/-build[0-9]+$/,"",v) }
                  split(v,a,".");
                  printf "%010d%010d%010d%010d %s\n", a[1], a[2], a[3], b, t
                }' \
              | sort -r | head -1 | cut -d" " -f2)
            if [ -z "$TAG" ]; then
              echo "未找到任何预发布版本，无法发布"; exit 1
            fi
            VER=$(echo "$TAG" | sed -E 's/^v//; s/-pre$//')
            echo "选取到最新预发布: $TAG -> 版本 $VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "pretag=v$VER-pre" >> "$GITHUB_OUTPUT"

      - name: Download Pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "${{ steps.resolve.outputs.pretag }}" \
            --dir /tmp/assets \
            --repo "${{ github.repository }}"
          echo "Downloaded assets:"
          ls -lah /tmp/assets/

      - name: Verify assets (informational)
        run: |
          VER="${{ steps.resolve.outputs.version }}"
          # 只列**真的会被构建出来**的产物。当前 build.yml 构 Windows + Linux:
          # 苹果全线不做,Android 端待重构。
          # 把不存在的平台留在这儿只会让每次发布刷一串假「缺少 xxx」,久了没人看这段输出。
          EXPECTED=(
            "LinPlayer-Windows-v$VER.zip"
            "LinPlayer-Linux-v$VER.zip"
          )
          MISSING=0
          for f in "${EXPECTED[@]}"; do
            if [ -f "/tmp/assets/$f" ]; then
              echo "✅ $f"
            else
              echo "⚠️ 缺少: $f（该平台将不在本次发布中）"
              MISSING=$((MISSING+1))
            fi
          done
          echo "缺失 $MISSING 个平台产物（不阻断发布）"

      - name: Generate SHA256 checksums
        run: |
          # 重新为最终发布产物生成汇总校验文件（覆盖预发布里旧的同名文件），
          # 随 files: /tmp/assets/* 一起上传，供 App 端校验安装包完整性。
          cd /tmp/assets
          rm -f SHA256SUMS
          for f in *; do [ -f "$f" ] && sha256sum "$f"; done > SHA256SUMS
          echo "Generated SHA256SUMS:"; cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve.outputs.version }}
          name: Release v${{ steps.resolve.outputs.version }}
          prerelease: false
          make_latest: true
          files: /tmp/assets/*
          generate_release_notes: true
          body: |
            ## LinPlayer v${{ steps.resolve.outputs.version }}

            自动更新：应用每 24 小时检查一次，发现此「最新发布」即提示升级。

            ### 下载
            - **Windows**：`LinPlayer-Windows-v${{ steps.resolve.outputs.version }}.zip`（免安装绿色包，解压即用）
            - **Linux (x86_64)**：`LinPlayer-Linux-v${{ steps.resolve.outputs.version }}.zip`（免安装绿色包，解压后 `./LinPlayer`）

            ### 说明
            - Windows 端内置完整版 libmpv（支持 PGS/SUP 图形字幕）。
            - Linux 端的便携只覆盖**数据**，不覆盖**运行库**。需要系统已装：
              - `libwebkit2gtk-4.1-0` + `libgtk-3-0` + `libsoup-3.0-0`（Tauri 在 Linux 上就是 GTK3 + WebKitGTK）。
                必须是 **4.1** 不是 4.0 —— 这决定系统下限：**Ubuntu ≥ 22.04 / Debian ≥ 12 / Fedora ≥ 36**。
              - `libmpv2`（Debian/Ubuntu，旧版叫 `libmpv1`）/ `mpv-libs`（Fedora）/ `mpv`（Arch）。
                两个 soname 都认（运行时 dlopen）；想自带可把 `libmpv.so.2` 放进解压目录（已配 `$ORIGIN` rpath，同级优先）。
            - Linux 端需要 X11；Wayland 会话下自动经 XWayland 运行（视频窗口须由程序自行定位，Wayland 不提供该能力）。
            - 两端绿色包的全部数据（账号/缓存/下载）都写在主程序同级的 `userdata/`，
              整个文件夹拷走即完成迁移；删掉文件夹即卸载干净。

      - name: Delete Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.resolve.outputs.pretag }}" \
            --yes \
            --repo "${{ github.repository }}" \
            --cleanup-tag
