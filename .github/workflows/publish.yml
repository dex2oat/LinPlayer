name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号(如 1.0.0，需对应已存在的 *-pre 预发布)；留空=自动取最新 pre'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Promote Pre-release to Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version (input or latest pre-release)
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ inputs.version }}"
          if [ -z "$VER" ]; then
            echo "未指定版本，自动选取最新预发布(*-pre)…"
            TAG=$(gh release list --repo "${{ github.repository }}" --limit 50 \
              --json tagName,isPrerelease \
              --jq 'map(select(.isPrerelease)) | .[0].tagName // empty')
            if [ -z "$TAG" ]; then
              echo "未找到任何预发布版本，无法发布"; exit 1
            fi
            VER=$(echo "$TAG" | sed -E 's/^v//; s/-pre$//')
            echo "选取到最新预发布: $TAG -> 版本 $VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "pretag=v$VER-pre" >> "$GITHUB_OUTPUT"

      - name: Download Pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "${{ steps.resolve.outputs.pretag }}" \
            --dir /tmp/assets \
            --repo "${{ github.repository }}"
          echo "Downloaded assets:"
          ls -lah /tmp/assets/

      - name: Verify assets (informational)
        run: |
          VER="${{ steps.resolve.outputs.version }}"
          EXPECTED=(
            "LinPlayer-Android-Mobile-v$VER-arm64-v8a.apk"
            "LinPlayer-Android-TV-v$VER-armeabi-v7a.apk"
            "LinPlayer-iOS-v$VER-unsigned.zip"
            "LinPlayer-AppleTV-v$VER-unsigned-app.zip"
            "LinPlayer-Windows-v$VER.zip"
            "LinPlayer-Linux-v$VER.tar.gz"
            "LinPlayer-macOS-v$VER.zip"
          )
          MISSING=0
          for f in "${EXPECTED[@]}"; do
            if [ -f "/tmp/assets/$f" ]; then
              echo "✅ $f"
            else
              echo "⚠️ 缺少: $f（该平台将不在本次发布中）"
              MISSING=$((MISSING+1))
            fi
          done
          echo "缺失 $MISSING 个平台产物（不阻断发布）"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve.outputs.version }}
          name: Release v${{ steps.resolve.outputs.version }}
          prerelease: false
          make_latest: true
          files: /tmp/assets/*
          generate_release_notes: true
          body: |
            ## LinPlayer v${{ steps.resolve.outputs.version }}

            自动更新：应用每 24 小时检查一次，发现此「最新发布」即提示升级。

            ### 下载
            - **Android Mobile**：`LinPlayer-Android-Mobile-v${{ steps.resolve.outputs.version }}-arm64-v8a.apk`
            - **Android TV**：`LinPlayer-Android-TV-v${{ steps.resolve.outputs.version }}-armeabi-v7a.apk`
            - **iOS**：`LinPlayer-iOS-v${{ steps.resolve.outputs.version }}-unsigned.zip`（未签名 .app）
            - **Apple TV**：`LinPlayer-AppleTV-v${{ steps.resolve.outputs.version }}-unsigned-app.zip`（未签名 .app）
            - **Windows**：`LinPlayer-Windows-v${{ steps.resolve.outputs.version }}.zip`（解压运行）
            - **Linux**：`LinPlayer-Linux-v${{ steps.resolve.outputs.version }}.tar.gz`
            - **macOS**：`LinPlayer-macOS-v${{ steps.resolve.outputs.version }}.zip`

            ### 说明
            - Windows/macOS 桌面端内置完整版 libmpv（支持 PGS/SUP 图形字幕）。
            - iOS / Apple TV 为未签名构建，需自行用证书重签后安装。

      - name: Delete Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.resolve.outputs.pretag }}" \
            --yes \
            --repo "${{ github.repository }}" \
            --cleanup-tag
