name: Build libmpv with PGS support

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build-libmpv-pgs.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  BUILD_REPO: media-kit/libmpv-android-video-build

jobs:
  build-and-commit:
    name: Build libmpv with PGS
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout LinPlayer
        uses: actions/checkout@v4
      
      - name: Clone media-kit build repo
        run: |
          git clone --depth 1 https://github.com/${{ env.BUILD_REPO }}.git /tmp/libmpv-build
          cd /tmp/libmpv-build
          echo "=== Original flavors/default.sh (subtitle decoders) ==="
          grep -n "enable-decoder=.*sub\|ssa\|ass\|srt" buildscripts/flavors/default.sh
      
      - name: Enable PGS decoder in FFmpeg config
        run: |
          CONFIG_FILE="/tmp/libmpv-build/buildscripts/flavors/default.sh"
          
          # 备份原文件
          cp "$CONFIG_FILE" "$CONFIG_FILE.bak"
          
          # 在字幕解码器列表中添加 pgssub
          # 找到 dvdsub 那一行，在其后添加 pgssub
          sed -i '/enable-decoder=dvdsub/a \	--enable-decoder=pgssub \\' "$CONFIG_FILE"
          
          echo "=== Modified flavors/default.sh (subtitle decoders) ==="
          grep -n "enable-decoder=.*sub\|ssa\|ass\|srt\|pgs" "$CONFIG_FILE"

      # ========================================================================
      # 开启 libplacebo + Vulkan：mpv gpu-next 的 Dolby Vision / HDR tone-map 依赖
      # libplacebo。没有它，DV Profile 5(IPTPQc2) 会被当普通 YUV 解 → 画面发紫。
      # 注意：libplacebo 的 Android 交叉编译 + 与本仓库锁定的 mpv 提交的版本匹配
      # 需要在 CI 上多轮迭代验证（无法本地校验）。构建失败时不会 commit 新库，
      # 因此不会破坏现有可用的 PGS 库。
      # ========================================================================
      - name: Enable libplacebo + Vulkan (gpu-next / Dolby Vision)
        run: |
          BS=/tmp/libmpv-build/buildscripts
          DEPINFO="$BS/include/depinfo.sh"
          MPVSH="$BS/scripts/mpv.sh"

          # 1) 依赖版本 + 依赖树：新增 libplacebo（依赖 shaderc 做运行时 GLSL→SPIR-V）。
          sed -i '/^v_libvpx=.*/a v_libplacebo=v6.338.2' "$DEPINFO"
          sed -i 's/^dep_shaderc=()$/dep_shaderc=()\ndep_libplacebo=(shaderc)/' "$DEPINFO"
          sed -i 's/^\tdep_mpv=(ffmpeg libass fftools_ffi)$/\tdep_mpv=(ffmpeg libass libplacebo fftools_ffi)/' "$DEPINFO"
          sed -i 's/^\tdep_mpv=(ffmpeg libass)$/\tdep_mpv=(ffmpeg libass libplacebo)/' "$DEPINFO"

          # 2) mpv：libplacebo 必开（DV/HDR 正确着色的关键，gpu-next 在 Android 上
          #    走 OpenGL ES 即可生效）；vulkan 设 auto，能编上就用、编不上不阻断。
          sed -i 's/-Dlibplacebo=disabled/-Dlibplacebo=enabled/' "$MPVSH"
          sed -i 's/-Dvulkan=disabled/-Dvulkan=auto/' "$MPVSH"

          # 3) libplacebo 构建脚本（meson 交叉编译）。opengl 必开；vulkan/shaderc/dovi
          #    设 auto 以提高跨 NDK/版本的成功率——libdovi(Rust)/shaderc pkg-config 等
          #    缺失时退化而非整体失败，仍保留 gpu-next 的 HDR/DV 着色修正能力。
          cat > "$BS/scripts/libplacebo.sh" <<'PLACEBO'
          #!/bin/bash -e
          . ../../include/depinfo.sh
          . ../../include/path.sh
          build=_build$ndk_suffix
          if [ "$1" == "clean" ]; then rm -rf "$build"; exit 0; fi
          [ "$1" == "build" ] || exit 255
          unset CC CXX
          meson setup "$build" --cross-file "$prefix_dir"/crossfile.txt \
            --prefer-static --default-library static \
            -Dopengl=enabled -Dvulkan=auto -Dshaderc=auto -Ddovi=auto \
            -Dglslang=disabled -Dlcms=disabled \
            -Ddemos=false -Dtests=false -Dbench=false -Dfuzz=false
          ninja -C "$build" -j$cores
          DESTDIR="$prefix_dir" ninja -C "$build" install
          PLACEBO
          chmod +x "$BS/scripts/libplacebo.sh"

          echo "=== mpv.sh after patch ==="; grep -nE "vulkan|libplacebo" "$MPVSH"
          echo "=== depinfo.sh after patch ==="; grep -nE "v_libplacebo|libplacebo|shaderc|dep_mpv" "$DEPINFO"

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip \
            ninja-build cmake pkg-config \
            autoconf automake libtool \
            wget curl unzip
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Setup Android SDK symlink
        working-directory: /tmp/libmpv-build/buildscripts
        run: |
          mkdir -p sdk
          ln -s ${ANDROID_HOME} ./sdk/android-sdk-linux
          echo "SDK linked: ${ANDROID_HOME}"
      
      - name: Build libmpv (default flavor with PGS)
        working-directory: /tmp/libmpv-build/buildscripts
        run: |
          # 清理之前的构建
          sudo rm -rf deps prefix
          
          # 下载依赖
          ./download.sh

          # libplacebo 源码（含 glad / Vulkan-Headers 等子模块，必须 --recursive）。
          # shaderc 由其脚本用 NDK 自带源码构建，但 build.sh 需要 deps/shaderc 目录存在。
          . ./include/depinfo.sh
          if [ ! -d deps/libplacebo ]; then
            git clone --recursive --branch "${v_libplacebo}" --depth 1 \
              https://code.videolan.org/videolan/libplacebo.git deps/libplacebo
          fi
          mkdir -p deps/shaderc

          # 应用补丁
          ./patch.sh
          
          # 复制修改后的配置
          rm -f scripts/ffmpeg.sh
          cp flavors/default.sh scripts/ffmpeg.sh
          
          # 构建所有架构
          for arch in armv7l arm64 x86 x86_64; do
            echo "Building for $arch..."
            ./build.sh --arch $arch mpv || {
              echo "Build failed for $arch, trying fallback..."
              exit 1
            }
          done
        timeout-minutes: 120

      # ========================================================================
      # 关键修复：构建与本次 libmpv 匹配的 libplayer.so（is.xyz.mpv.MPVLib 的 JNI 桥）。
      # media-kit/libmpv-android-video-build 只产出 libmpv + ffmpeg，**不产出 libplayer.so**，
      # 因此过去每次"单独重编 libmpv"都把旧的 libplayer.so 留下→与新 libmpv ABI 不匹配→
      # 运行时 libplayer.so 加载失败（MPVLib.create 无实现）→原生 mpv 完全不能播放。
      # 这里直接从 mpv-android 的 JNI 源码、针对**刚构建出来的 libmpv** 现编 libplayer.so，
      # 保证二者来自同一 libmpv、ABI 必然匹配。构建失败则整个 job 失败、不会提交（安全）。
      # ========================================================================
      - name: Build matching libplayer.so (mpv-android JNI bridge)
        working-directory: /tmp/libmpv-build/buildscripts
        run: |
          set -e
          . ./include/depinfo.sh

          # mpv-android 的 app JNI 源码（实现 Java_is_xyz_mpv_MPVLib_*）。
          # 该套源码与本仓库 is/xyz/mpv/MPVLib.kt 的 external 方法集一一对应。
          git clone --depth 1 https://github.com/mpv-android/mpv-android.git /tmp/mpv-android
          JNI=/tmp/mpv-android/app/src/main/jni
          echo "=== JNI sources ==="; ls -la "$JNI"

          NDKBIN="./sdk/android-sdk-linux/ndk/$v_ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
          API=24  # 与 app build.gradle.kts 的 minSdk 一致

          declare -A TRIPLE=(
            [arm64-v8a]=aarch64-linux-android
            [armeabi-v7a]=armv7a-linux-androideabi
            [x86]=i686-linux-android
            [x86_64]=x86_64-linux-android
          )

          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            PREFIX="prefix/$arch"
            if [ ! -f "$PREFIX/lib/libmpv.so" ]; then
              echo "⚠️ $arch: libmpv.so 缺失，跳过 libplayer 构建"
              continue
            fi
            CXX="$NDKBIN/${TRIPLE[$arch]}$API-clang++"
            echo "=== building libplayer.so for $arch ($CXX) ==="
            # 直接用 NDK clang 把 JNI .cpp 编成 libplayer.so，链接刚构建的 libmpv 与系统库。
            "$CXX" -shared -fPIC -std=c++17 -O2 \
              -o "$PREFIX/lib/libplayer.so" \
              "$JNI"/*.cpp \
              -I"$PREFIX/include" \
              -L"$PREFIX/lib" -lmpv \
              -landroid -lEGL -lGLESv3 -llog
            "$NDKBIN/llvm-strip" --strip-all "$PREFIX/lib/libplayer.so" || true
            echo "✅ $arch: libplayer.so 构建完成"
            # 校验导出了 MPVLib.create（最关键的符号）。
            if "$NDKBIN/llvm-nm" -D "$PREFIX/lib/libplayer.so" 2>/dev/null | grep -q "Java_is_xyz_mpv_MPVLib_create"; then
              echo "✅ $arch: 导出 Java_is_xyz_mpv_MPVLib_create"
            else
              echo "❌ $arch: 未导出 MPVLib_create —— 源码方法集可能与本仓库 MPVLib.kt 不一致"
              exit 1
            fi
          done

      - name: Verify PGS support in built libraries
        run: |
          echo "=== Verifying PGS support ==="
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            CODEC_LIB="/tmp/libmpv-build/buildscripts/prefix/$arch/lib/libavcodec.so"
            if [ -f "$CODEC_LIB" ]; then
              if strings "$CODEC_LIB" | grep -q "pgssub"; then
                echo "✅ $arch: PGS decoder found"
              else
                echo "❌ $arch: PGS decoder NOT found"
              fi
            else
              echo "⚠️ $arch: libavcodec.so not found at $CODEC_LIB"
            fi
          done

      - name: Verify libplacebo / Vulkan in libmpv
        run: |
          echo "=== Verifying libplacebo + Vulkan (gpu-next / Dolby Vision) ==="
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            MPV_LIB="/tmp/libmpv-build/buildscripts/prefix/$arch/lib/libmpv.so"
            [ -f "$MPV_LIB" ] || { echo "⚠️ $arch: libmpv.so not found"; continue; }
            if strings "$MPV_LIB" | grep -qiE "libplacebo|pl_vulkan|placebo"; then
              echo "✅ $arch: libplacebo present"
            else
              echo "❌ $arch: libplacebo NOT found (gpu-next/DV 不可用)"
            fi
            if strings "$MPV_LIB" | grep -qiE "vkCreateInstance|VK_KHR|vulkan"; then
              echo "✅ $arch: Vulkan symbols present"
            else
              echo "❌ $arch: Vulkan NOT found"
            fi
          done
      
      - name: Strip and copy to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs
          
          cd /tmp/libmpv-build/buildscripts
          . ./include/depinfo.sh
          
          # Strip 库文件
          STRIP="./sdk/android-sdk-linux/ndk/$v_ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            SOURCE_DIR="prefix/$arch/lib"
            DEST_DIR="$GITHUB_WORKSPACE/android/app/src/main/jniLibs/$arch"
            
            if [ -d "$SOURCE_DIR" ]; then
              mkdir -p "$DEST_DIR"
              
              # 复制所有 FFmpeg 库
              for lib in libavcodec.so libavformat.so libavutil.so libswscale.so libswresample.so libavfilter.so; do
                if [ -f "$SOURCE_DIR/$lib" ]; then
                  cp "$SOURCE_DIR/$lib" "$DEST_DIR/"
                  # Strip 以减小体积
                  $STRIP --strip-all "$DEST_DIR/$lib" 2>/dev/null || true
                fi
              done
              
              # 复制 libmpv.so
              if [ -f "$SOURCE_DIR/libmpv.so" ]; then
                cp "$SOURCE_DIR/libmpv.so" "$DEST_DIR/"
                $STRIP --strip-all "$DEST_DIR/libmpv.so" 2>/dev/null || true
              fi

              # 复制本次现编、与 libmpv 匹配的 libplayer.so（JNI 桥，避免 ABI 不匹配）。
              if [ -f "$SOURCE_DIR/libplayer.so" ]; then
                cp "$SOURCE_DIR/libplayer.so" "$DEST_DIR/"
                $STRIP --strip-all "$DEST_DIR/libplayer.so" 2>/dev/null || true
              fi

              echo "✅ Copied libraries for $arch"
              ls -lh "$DEST_DIR/"
            fi
          done
      
      - name: Commit libraries
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add android/app/src/main/jniLibs/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild libmpv (PGS) + matching libplayer.so JNI bridge"
            git push
            echo "✅ Libraries committed"
          fi
        continue-on-error: true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: libmpv-with-pgs
          path: |
            android/app/src/main/jniLibs/**/*.so
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # Windows 完整版 libmpv（含 PGS/SUP 解码器）—— 取 shinchiro 完整构建
  # ============================================================
  assemble-windows-libmpv:
    name: Assemble full libmpv (Windows)
    runs-on: windows-latest
    steps:
      - name: Resolve latest shinchiro mpv-dev
        id: src
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $rel = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' } | Select-Object -First 1
          if (-not $asset) { throw "未找到 mpv-dev-x86_64 资产" }
          echo "url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          echo "name=$($asset.name)" >> $env:GITHUB_OUTPUT
          Write-Host "Source: $($asset.name)"

      - name: Download and extract libmpv-2.dll
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ steps.src.outputs.url }}" -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev | Out-Null
          $dll = Get-ChildItem -Path mpv-dev -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
          if (-not $dll) { throw "压缩包内未找到 libmpv-2.dll" }
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item $dll.FullName "out/libmpv-2.dll"
          $size = (Get-Item out/libmpv-2.dll).Length
          Write-Host "libmpv-2.dll size: $size"
          if ($size -lt 60MB) { throw "libmpv-2.dll 体积过小，可能不是完整版" }

      - name: Upload Windows libmpv
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-windows
          path: out/libmpv-2.dll
          retention-days: 7

  # macOS：media_kit 随包 Mpv.framework 通常已含完整解码器；如需替换，把完整版
  # 二进制放入 macos/libmpv/Mpv（构建末尾 Upgrade libmpv 阶段会覆盖）。便携自包含
  # 的 macOS libmpv 需静态链接 ffmpeg，CI 自动产出不可靠，故此处不自动构建。
  # Linux：使用系统 libmpv（发行版包通常完整含 PGS），无需在此构建。

  # ============================================================
  # 发布到 libmpv-latest（滚动预发布），供 build.yml 消费
  # ============================================================
  publish-libmpv:
    name: Publish libmpv-latest
    needs: [assemble-windows-libmpv]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download libmpv artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libmpv-*
          path: ./libmpv-assets
          merge-multiple: true

      - name: List artifacts
        run: ls -lah ./libmpv-assets || true

      - name: Publish/refresh libmpv-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libmpv-latest
          name: 完整版 libmpv（最新）
          prerelease: true
          files: ./libmpv-assets/*
          body: |
            桌面端完整版 libmpv（含 PGS/SUP `hdmv_pgs_subtitle` 解码器），供 build.yml 自动消费。

            - **Windows**：`libmpv-2.dll`（来自 shinchiro 完整构建）
            - macOS：用随包 Mpv.framework 或手动放入 `macos/libmpv/Mpv`
            - Linux：使用系统 `libmpv`
