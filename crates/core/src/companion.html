<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0f1216">
<title>LinPlayer 遥控</title>
<style>
/* 手机端控制台。故意用一整页原生 HTML/CSS/JS,不引任何外部资源:
   局域网里可能根本没有外网,CDN 一挂这页就是白的。 */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:#0f1216;color:#e8eaed;font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  display:flex;flex-direction:column;overscroll-behavior:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
}
header{padding:14px 18px 10px;display:flex;align-items:center;gap:10px}
header .t{font-size:17px;font-weight:650}
header .s{margin-left:auto;font-size:13px;color:#7d8792}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 24px}
.pane{display:none}.pane.on{display:block}
h2{font-size:14px;color:#8b949e;font-weight:600;margin:22px 0 10px;letter-spacing:.04em}
h2:first-child{margin-top:6px}

/* ---- 底部标签栏:拇指够得到,且切换不重载页面 ---- */
nav{
  display:flex;background:#141920;border-top:1px solid #232a33;
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1;background:none;border:0;color:#7d8792;font:inherit;font-size:12px;
  padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
}
nav button.on{color:#5b9dff}
nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ---- 遥控盘 ---- */
.dpad{
  width:min(78vw,300px);aspect-ratio:1;margin:10px auto 0;position:relative;
  border-radius:50%;background:#171d25;border:1px solid #262e39;
}
.dpad button{
  position:absolute;background:none;border:0;color:#c7ced6;padding:0;
  display:flex;align-items:center;justify-content:center;
}
.dpad .u,.dpad .d{left:28%;width:44%;height:30%}
.dpad .u{top:0}.dpad .d{bottom:0}
.dpad .l,.dpad .r{top:28%;height:44%;width:30%}
.dpad .l{left:0}.dpad .r{right:0}
.dpad .ok{
  left:29%;top:29%;width:42%;height:42%;border-radius:50%;
  background:#5b9dff;color:#fff;font-size:19px;font-weight:650;
}
.dpad button:active{opacity:.55}
.dpad svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.rowbtn{display:flex;gap:12px;margin-top:18px}
.rowbtn button{
  flex:1;height:52px;border-radius:14px;border:1px solid #2b333d;background:#171d25;
  color:#e8eaed;font:inherit;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.rowbtn button:active{background:#20272f}

/* ---- 通用控件 ---- */
label{display:block;margin:0 0 6px;color:#8b949e;font-size:13px}
input,select{
  width:100%;height:46px;padding:0 13px;margin:0 0 14px;border-radius:11px;
  border:1px solid #2b333d;background:#171d25;color:#e8eaed;font:inherit;font-size:16px;
}
/* textarea 不能沿用上面那条:height 写死 46px 会把多行输入压成一行。 */
textarea{
  width:100%;padding:11px 13px;margin:0 0 14px;border-radius:11px;resize:vertical;
  border:1px solid #2b333d;background:#171d25;color:#e8eaed;font:inherit;font-size:15px;
  line-height:1.5;box-sizing:border-box;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:#5b9dff}
button.pri{
  width:100%;height:50px;border:0;border-radius:12px;background:#5b9dff;color:#fff;
  font:inherit;font-size:16px;font-weight:600;
}
button.pri:disabled{opacity:.5}
.card{background:#171d25;border:1px solid #232a33;border-radius:14px;padding:14px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#171d25;
  border:1px solid #232a33;border-radius:13px;margin-bottom:10px}
.row .g{flex:1;min-width:0}
.row .n{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .m{font-size:12px;color:#7d8792;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row button{border:0;background:#242c36;color:#c7ced6;font:inherit;font-size:13px;
  padding:8px 13px;border-radius:9px}
.row button.danger{background:#3a2226;color:#ff8b8b}
.tag{font-size:11px;padding:2px 7px;border-radius:6px;background:#1d3557;color:#8bb8ff}
.hint{color:#7d8792;font-size:13px;margin:8px 0 16px}
.err{color:#ff8b8b;font-size:14px;margin:10px 0}
#toast{
  position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#242c36;
  color:#e8eaed;padding:10px 18px;border-radius:12px;font-size:14px;opacity:0;
  transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center;z-index:9
}
#toast.on{opacity:1}

/* ---- 正在播放 ---- */
.np .ti{font-size:18px;font-weight:650;margin-bottom:3px}
.np .su{font-size:13px;color:#8b949e}
.bar{height:5px;border-radius:3px;background:#2b333d;margin:14px 0 7px;overflow:hidden}
.bar i{display:block;height:100%;background:#5b9dff;width:0}
.tm{display:flex;justify-content:space-between;font-size:12px;color:#7d8792;font-variant-numeric:tabular-nums}
.pc{display:flex;gap:10px;margin-top:16px}
.pc button{
  flex:1;height:56px;border-radius:14px;border:1px solid #2b333d;background:#171d25;color:#e8eaed;
  display:flex;align-items:center;justify-content:center
}
.pc button.main{background:#5b9dff;border-color:#5b9dff;color:#fff}
.pc button:active{opacity:.6}
.pc svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<header>
  <div class="t">LinPlayer</div>
  <div class="s" id="conn">连接中…</div>
</header>

<main>
  <!-- ============ 遥控 ============ -->
  <section class="pane on" id="p-remote">
    <div class="dpad">
      <button class="u" data-k="up"><svg viewBox="0 0 24 24"><path d="M6 15l6-6 6 6"/></svg></button>
      <button class="l" data-k="left"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <button class="ok" data-k="enter">OK</button>
      <button class="r" data-k="right"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
      <button class="d" data-k="down"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>
    </div>
    <div class="rowbtn">
      <button data-k="back"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>返回</button>
      <button data-k="home"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2"><path d="M3 11l9-8 9 8M6 10v10h12V10"/></svg>首页</button>
    </div>
    <div class="hint" style="margin-top:18px">按住方向键可连按。电视上正在放东西时,去「播放」页控制进度。</div>
  </section>

  <!-- ============ 播放 ============ -->
  <section class="pane" id="p-play">
    <div class="np card" id="np-card">
      <div class="ti" id="np-title">没有正在播放的内容</div>
      <div class="su" id="np-sub">在电视上或用「搜索」挑一部片</div>
      <div class="bar"><i id="np-bar"></i></div>
      <div class="tm"><span id="np-pos">0:00</span><span id="np-dur">0:00</span></div>
    </div>
    <div class="pc">
      <button data-seek="-600" title="快退10分钟"><svg viewBox="0 0 24 24"><path d="M11 19l-9-7 9-7v14zM22 19l-9-7 9-7v14z"/></svg></button>
      <button data-seek="-30"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a6 6 0 11-6 6H4a8 8 0 108-8z"/></svg></button>
      <button class="main" id="btn-pause"><svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg></button>
      <button data-seek="30"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7a6 6 0 106 6h2a8 8 0 11-8-8z"/></svg></button>
      <button data-seek="600"><svg viewBox="0 0 24 24"><path d="M13 19l9-7-9-7v14zM2 19l9-7-9-7v14z"/></svg></button>
    </div>
    <div class="rowbtn"><button id="btn-stop">停止播放</button></div>
  </section>

  <!-- ============ 搜索 ============ -->
  <section class="pane" id="p-search">
    <label>在手机上打字,结果点一下电视就打开</label>
    <input id="q" placeholder="片名" autocapitalize="off" autocomplete="off" enterkeyhint="search">
    <div id="sres"></div>
  </section>

  <!-- ============ 服务器 ============ -->
  <section class="pane" id="p-servers">
    <h2>已添加</h2>
    <div id="accs"></div>
    <h2>添加新服务器</h2>
    <label>服务器地址</label>
    <input id="a-server" placeholder="https://" inputmode="url" autocapitalize="off" autocomplete="off">
    <label>用户名</label>
    <input id="a-user" autocapitalize="off" autocomplete="off">
    <label>密码</label>
    <input id="a-pass" type="password" autocomplete="off">
    <button class="pri" id="a-go">添加并登录</button>
    <div class="err" id="a-err"></div>

    <h2>添加 Stremio</h2>
    <label>每行一个 addon 的 manifest.json 地址。第一行当账号标识，建议放元数据 addon。</label>
    <textarea id="st-cfg" rows="5" placeholder="https://v3-cinemeta.strem.io/manifest.json"
      autocapitalize="off" autocomplete="off" spellcheck="false"></textarea>
    <label>只有元数据 addon 是出不了播放源的，要能播必须再加至少一个 stream 类 addon。
      自建了 Stremio 流媒体服务器就单起一行填 <code>server=http://地址:11470</code>，
      种子源才播得了；没填的会在列表里置灰并注明原因。</label>
    <button class="pri" id="st-go">添加 Stremio</button>
    <div class="err" id="st-err"></div>
  </section>

  <!-- ============ 设置 ============ -->
  <section class="pane" id="p-settings">
    <h2>外观</h2>
    <label>主题</label>
    <select id="s-theme"><option value="dark">深色</option><option value="light">浅色</option></select>

    <h2>字幕与音轨</h2>
    <label>音轨语言</label><select id="s-alang"></select>
    <label>字幕语言</label><select id="s-slang"></select>
    <label>默认开字幕</label>
    <select id="s-sub"><option value="1">开</option><option value="0">关</option></select>

    <h2>网络代理</h2>
    <label>类型</label>
    <select id="s-ptype">
      <option value="none">不使用</option><option value="http">HTTP</option>
      <option value="https">HTTPS</option><option value="socks5">SOCKS5</option><option value="socks4">SOCKS4</option>
    </select>
    <label>主机</label><input id="s-phost" autocapitalize="off" autocomplete="off">
    <label>端口</label><input id="s-pport" inputmode="numeric">
    <button class="pri" id="s-save">保存设置</button>

    <h2>存储</h2>
    <div class="row"><div class="g"><div class="n">缓存占用</div><div class="m" id="s-cache">统计中…</div></div>
      <button id="s-clear">清空</button></div>
  </section>
</main>

<nav>
  <button class="on" data-p="remote"><svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="3"/><circle cx="12" cy="8" r="1.6"/><path d="M10 14h4M10 17.5h4"/></svg>遥控</button>
  <button data-p="play"><svg viewBox="0 0 24 24"><path d="M8 5l11 7-11 7z"/></svg>播放</button>
  <button data-p="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>搜索</button>
  <button data-p="servers"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/><path d="M7 7.5h.01M7 16.5h.01"/></svg>服务器</button>
  <button data-p="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-2.7 1.1V21a2 2 0 11-4 0v-.1A1.6 1.6 0 006.9 19.5l-.1.1A2 2 0 114 16.8l.1-.1A1.6 1.6 0 003 15H3a2 2 0 110-4h.1A1.6 1.6 0 004.5 6.9l-.1-.1A2 2 0 117.2 4l.1.1A1.6 1.6 0 009 4.6V4a2 2 0 114 0v.1a1.6 1.6 0 002.7 1.1l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00.9 2.7H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z"/></svg>设置</button>
</nav>

<div id="toast"></div>

<script>
/* 所有接口都是 POST <本页地址>/api/<名字>,请求体和响应体都是 JSON。
   地址取自 location.pathname —— 里面带着一次性 token,别写死。 */
const BASE = location.pathname.replace(/\/$/, "");
async function api(name, body) {
  const r = await fetch(BASE + "/api/" + name, {
    method: "POST",
    body: JSON.stringify(body || {}),
  });
  const j = await r.json();
  if (j && j.error) throw new Error(j.error);
  return j;
}
const $ = (id) => document.getElementById(id);
let toastTimer;
function toast(m) {
  const t = $("toast");
  t.textContent = m; t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("on"), 2200);
}
const fmt = (s) => {
  s = Math.max(0, Math.floor(s || 0));
  const h = Math.floor(s / 3600), m = Math.floor(s / 60) % 60, x = s % 60;
  const p = (n) => String(n).padStart(2, "0");
  return h ? `${h}:${p(m)}:${p(x)}` : `${m}:${p(x)}`;
};

/* ---------- 标签切换 ---------- */
let pane = "remote";
document.querySelectorAll("nav button").forEach((b) => {
  b.onclick = () => {
    pane = b.dataset.p;
    document.querySelectorAll("nav button").forEach((x) => x.classList.toggle("on", x === b));
    document.querySelectorAll(".pane").forEach((p) => p.classList.toggle("on", p.id === "p-" + pane));
    if (pane === "servers") loadAccounts();
    if (pane === "settings") loadSettings();
    poll();
  };
});

/* ---------- 遥控 ----------
   按下即发,不等松手:遥控器的手感来自即时反馈。长按靠 repeat 定时器,
   间隔 220ms —— 比电视端焦点库的 120ms 节流稍慢,免得一次长按冲过头。 */
let repeatTimer;
function sendKey(k) { api("key", { k }).catch(() => {}); }
document.querySelectorAll("[data-k]").forEach((b) => {
  const k = b.dataset.k;
  const start = (e) => {
    e.preventDefault();
    sendKey(k);
    if (navigator.vibrate) navigator.vibrate(8);
    clearInterval(repeatTimer);
    if (k !== "enter" && k !== "back" && k !== "home")
      repeatTimer = setInterval(() => sendKey(k), 220);
  };
  const stop = () => clearInterval(repeatTimer);
  b.addEventListener("touchstart", start, { passive: false });
  b.addEventListener("touchend", stop);
  b.addEventListener("touchcancel", stop);
  b.addEventListener("mousedown", start);
  b.addEventListener("mouseup", stop);
  b.addEventListener("mouseleave", stop);
});

/* ---------- 播放 ---------- */
let np = null; // 最近一次拿到的播放状态
$("btn-pause").onclick = () => {
  if (!np) return toast("现在没有在播放");
  api("play_ctl", { a: "pause", v: np.paused ? 0 : 1 }).then(poll).catch((e) => toast(String(e.message)));
};
$("btn-stop").onclick = () =>
  api("play_ctl", { a: "stop" }).then(() => { toast("已停止"); poll(); }).catch(() => {});
document.querySelectorAll("[data-seek]").forEach((b) => {
  b.onclick = () => {
    if (!np) return toast("现在没有在播放");
    api("play_ctl", { a: "seek", v: np.pos + Number(b.dataset.seek) }).then(poll).catch(() => {});
  };
});

function renderPlaying(s) {
  np = s;
  const has = !!s;
  $("np-title").textContent = has ? (s.title || "正在播放") : "没有正在播放的内容";
  $("np-sub").textContent = has ? (s.sub || (s.paused ? "已暂停" : "播放中")) : "在电视上或用「搜索」挑一部片";
  $("np-bar").style.width = has && s.dur > 0 ? (s.pos / s.dur) * 100 + "%" : "0";
  $("np-pos").textContent = fmt(has ? s.pos : 0);
  $("np-dur").textContent = fmt(has ? s.dur : 0);
  $("btn-pause").innerHTML = has && s.paused
    ? '<svg viewBox="0 0 24 24"><path d="M8 5l11 7-11 7z"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg>';
}

/* ---------- 轮询 ----------
   只在页面可见时轮;息屏/切到后台就停,别把电视和手机的电都耗着。
   播放页 1s(要动进度条),其它页 4s(只要连接状态)。 */
let pollTimer;
async function poll() {
  try {
    const s = await api("state", {});
    $("conn").textContent = s.session ? s.session.name || "已连接" : "未登录";
    renderPlaying(s.playing);
  } catch {
    $("conn").textContent = "电视没响应";
  }
}
function schedule() {
  clearInterval(pollTimer);
  if (document.hidden) return;
  pollTimer = setInterval(poll, pane === "play" ? 1000 : 4000);
  poll();
}
document.addEventListener("visibilitychange", schedule);

/* ---------- 搜索 ---------- */
let sTimer;
$("q").addEventListener("input", () => {
  clearTimeout(sTimer);
  const q = $("q").value.trim();
  if (!q) return ($("sres").innerHTML = "");
  sTimer = setTimeout(async () => {
    try {
      const r = await api("search", { q });
      const list = r.items || [];
      if (!list.length) return ($("sres").innerHTML = '<div class="hint">没有找到</div>');
      $("sres").innerHTML = "";
      for (const it of list) {
        const d = document.createElement("div");
        d.className = "row";
        d.innerHTML =
          '<div class="g"><div class="n"></div><div class="m"></div></div><button>打开</button>';
        d.querySelector(".n").textContent = it.name;
        d.querySelector(".m").textContent =
          [it.type, it.year, it.from].filter(Boolean).join(" · ");
        d.querySelector("button").onclick = () =>
          api("open", { id: it.id, server: it.server || "" })
            .then(() => toast("已在电视上打开"))
            .catch((e) => toast(String(e.message)));
        $("sres").appendChild(d);
      }
    } catch (e) {
      $("sres").innerHTML = '<div class="err"></div>';
      $("sres").firstChild.textContent = String(e.message);
    }
  }, 350);
});

/* ---------- 服务器 ---------- */
async function loadAccounts() {
  try {
    const r = await api("accounts", {});
    const box = $("accs");
    box.innerHTML = "";
    if (!(r.accounts || []).length) {
      box.innerHTML = '<div class="hint">还没有服务器,在下面添加一台。</div>';
      return;
    }
    for (const a of r.accounts) {
      const d = document.createElement("div");
      d.className = "row";
      d.innerHTML =
        '<div class="g"><div class="n"></div><div class="m"></div></div>' +
        '<button class="sw">切换</button><button class="danger">删除</button>';
      d.querySelector(".n").textContent = a.name;
      d.querySelector(".m").textContent = a.remark || a.server;
      if (a.active) {
        const t = document.createElement("span");
        t.className = "tag"; t.textContent = "当前";
        d.querySelector(".n").appendChild(document.createTextNode(" "));
        d.querySelector(".n").appendChild(t);
        d.querySelector(".sw").remove();
      } else {
        d.querySelector(".sw").onclick = () =>
          api("switch", { server: a.server }).then(() => { toast("已切换"); loadAccounts(); })
            .catch((e) => toast(String(e.message)));
      }
      d.querySelector(".danger").onclick = () => {
        if (!confirm(`删除「${a.name}」?`)) return;
        api("remove", { server: a.server }).then(() => { toast("已删除"); loadAccounts(); })
          .catch((e) => toast(String(e.message)));
      };
      box.appendChild(d);
    }
  } catch (e) {
    $("accs").innerHTML = '<div class="err">读不到服务器列表</div>';
  }
}
$("a-go").onclick = async () => {
  const b = $("a-go");
  $("a-err").textContent = "";
  b.disabled = true; b.textContent = "连接中…";
  try {
    await api("login", {
      server: $("a-server").value.trim(),
      user: $("a-user").value.trim(),
      pass: $("a-pass").value,
    });
    $("a-server").value = $("a-user").value = $("a-pass").value = "";
    toast("已添加并登录");
    loadAccounts();
  } catch (e) {
    $("a-err").textContent = String(e.message);
  } finally {
    b.disabled = false; b.textContent = "添加并登录";
  }
};

/* Stremio 一个账号 = 一组 addon(元数据来自一个、播放源来自另一个)。
   拆分逻辑与 PC 端 AddServerPage 保持一致:第一个非 server= 行当 base_url(账号 id),
   其余整块原样交给核层再拆(见 crates/core/src/source/stremio.rs 顶部注释)。 */
$("st-go").onclick = async () => {
  const b = $("st-go");
  $("st-err").textContent = "";
  const lines = $("st-cfg").value.split("\n").map(s => s.trim())
    .filter(s => s && !s.startsWith("#"));
  const addons = lines.filter(l => !/^server\s*=/i.test(l));
  if (!addons.length) { $("st-err").textContent = "至少要填一个 addon 的 manifest 地址"; return; }
  const primary = addons[0];
  b.disabled = true; b.textContent = "连接中…";
  try {
    await api("source_login", {
      kind: "stremio",
      base_url: primary,
      cookie: lines.filter(l => l !== primary).join("\n"),
    });
    $("st-cfg").value = "";
    toast("已添加 Stremio");
    loadAccounts();
  } catch (e) {
    $("st-err").textContent = String(e.message);
  } finally {
    b.disabled = false; b.textContent = "添加 Stremio";
  }
};

/* ---------- 设置 ---------- */
const LANGS = [["", "自动"], ["chi", "中文"], ["yue", "粤语"], ["jpn", "日语"], ["eng", "英语"],
  ["kor", "韩语"], ["fre", "法语"], ["ger", "德语"], ["spa", "西班牙语"], ["por", "葡萄牙语"],
  ["ita", "意大利语"], ["rus", "俄语"], ["tha", "泰语"], ["vie", "越南语"], ["ind", "印尼语"],
  ["ara", "阿拉伯语"], ["hin", "印地语"]];
for (const id of ["s-alang", "s-slang"]) {
  $(id).innerHTML = LANGS.map(([v, l]) => `<option value="${v}">${l}</option>`).join("");
}
async function loadSettings() {
  try {
    const s = await api("settings", {});
    $("s-theme").value = s.theme || "dark";
    $("s-alang").value = s.audio_lang || "";
    $("s-slang").value = s.sub_lang || "";
    $("s-sub").value = s.sub_enabled ? "1" : "0";
    $("s-ptype").value = s.proxy_type || "none";
    $("s-phost").value = s.proxy_host || "";
    $("s-pport").value = s.proxy_port || "";
    $("s-cache").textContent = s.cache_human || "—";
  } catch (e) {
    toast("读设置失败:" + e.message);
  }
}
$("s-save").onclick = async () => {
  try {
    await api("set_settings", {
      theme: $("s-theme").value,
      audio_lang: $("s-alang").value,
      sub_lang: $("s-slang").value,
      sub_enabled: $("s-sub").value === "1",
      proxy_type: $("s-ptype").value,
      proxy_host: $("s-phost").value.trim(),
      proxy_port: Number($("s-pport").value) || 0,
    });
    toast("已保存");
  } catch (e) {
    toast(String(e.message));
  }
};
$("s-clear").onclick = async () => {
  if (!confirm("清空图片和视频缓存?")) return;
  try { await api("clear_cache", {}); toast("已清空"); loadSettings(); }
  catch (e) { toast(String(e.message)); }
};

schedule();
</script>
