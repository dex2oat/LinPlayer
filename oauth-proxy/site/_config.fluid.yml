favicon: /img/linplayer-icon.png
apple_touch_icon: /img/linplayer-icon.png
tab_title_separator: " · "

banner:
  parallax: false

fun_features:
  typing:
    enable: false

scroll_down_arrow:
  enable: false

navbar:
  blog_title: LinPlayer
  menu:
    - { key: 'home', name: '首页', link: '/', icon: 'iconfont icon-home-fill' }
    - { key: 'wiki', name: '文档', link: '/archives/', icon: 'iconfont icon-archive-fill' }
    - { key: 'about', name: '关于', link: '/about/', icon: 'iconfont icon-user-fill' }

index:
  banner_img: /img/pixel-scene.svg
  slogan:
    enable: true
    text: 'LinPlayerのWiki'
    api: false
  banner_img_height: 100
  banner_mask_alpha: 0
  post_meta:
    date: false
    category: false
    tag: false
  post_sticky:
    enable: false

post:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 58
  banner_mask_alpha: 0
  toc:
    enable: false
  copyright:
    enable: false
  meta:
    author:
      enable: false
    date:
      enable: false
    wordcount:
      enable: false
    min2read:
      enable: false
    views:
      enable: false

archive:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 50
  banner_mask_alpha: 0

category:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 50
  banner_mask_alpha: 0

tag:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 50
  banner_mask_alpha: 0

about:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 56
  banner_mask_alpha: 0

page:
  banner_img: /img/pixel-scene.svg
  banner_img_height: 50
  banner_mask_alpha: 0

footer:
  content: '<a href="https://github.com/zzzwannasleep/LinPlayer" target="_blank" rel="noopener">LinPlayer</a> · sugar pixel docs · built with Hexo + Fluid'

dark_mode:
  enable: false

custom_css:
  - /css/pixel-dream.css

custom_js:
  - /js/pixel-dream.js
