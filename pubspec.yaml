name: linplayer_mobile
description: LinPlayer - Emby第三方客户端移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  
  # 路由
  go_router: ^14.0.0
  
  # 网络
  dio: ^5.4.0
  crypto: ^3.0.3
  # 凭据安全：服务器密码/Token 用 OS 钥匙串加密落盘（H11）
  flutter_secure_storage: ^9.2.2
  # 备份口令加密（H12）：PBKDF2 + AES-GCM，纯 Dart 跨平台
  cryptography: ^2.7.0
  # SOCKS4/5 代理支持（Dart HttpClient 原生只支持 HTTP 代理）
  socks5_proxy: ^1.0.4
  # 内置 zashboard 面板（仅 Android TV 使用，指向本地 mihomo external-ui）
  webview_flutter: ^4.7.0
  
  # 图片加载
  extended_image: ^8.2.0
  http_client_helper: ^3.0.0
  
  # 本地存储
  shared_preferences: ^2.2.2

  # 原生播放器
  # media_kit: 跨平台视频播放器（基于 libmpv 的封装库）
  # 注意：PC 端 PGS/SUP 渲染依赖 libmpv 是否包含 hdmv_pgs_subtitle 解码器；
  #       media-kit 的 Windows 预编译包默认不含该解码器，需额外替换 libmpv-2.dll。
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # 工具
  ffi: ^2.2.0
  path_provider: ^2.1.2
  # 便携化:直接重定向 PathProviderPlatform.instance(见 core/services/portable_paths.dart)
  path_provider_platform_interface: ^2.1.0
  path: ^1.9.0
  uuid: ^4.3.3
  win32: ^5.15.0
  # 应用内更新：下载 APK 后调起系统安装器（Android/TV 覆盖更新）
  open_filex: ^4.5.0
  
  # UI增强
  cupertino_icons: ^1.0.6

  # 局域网扫码遥控：生成二维码（内置 HTTP 服务用 dart:io，无需额外依赖）
  qr_flutter: ^4.1.0

  # 动效（统一三端动画：入场/错峰/shimmer/淡入缩放）
  flutter_animate: ^4.5.0
  
  # 颜色提取
  palette_generator: ^0.3.3+7

  # 投屏使用纯HTTP扫描（无需原生插件）

  # 下载：自建多线程(Range 分段)下载引擎，见 lib/core/services/download/

  # 图片/文件选择
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  
  # XML解析 (DLNA设备描述)
  xml: ^6.5.0
  fluent_ui: ^4.15.1
  macos_ui: ^2.2.2
  window_manager: ^0.5.1

  # 插件系统：QuickJS 脚本引擎（每个插件独立 isolate，崩溃/超时隔离）
  # 使用仓库内 vendored 版本：已打 Dart 3 / ffi 2.x 兼容补丁（见 third_party/flutter_qjs）。
  flutter_qjs:
    path: third_party/flutter_qjs
  # 插件系统：.lpk 打包解压（zip）
  archive: ^3.6.1
  app_links: ^7.1.2
  # 筛选弹窗按拼音首字母排序（中文转拼音，纯 Dart 离线）
  lpinyin: ^2.0.3

  # 统一三端组件风格（腾讯 TDesign）。使用 vendored 版本：已打补丁修复
  # td_icons.dart 中 `extends IconData`（新版 Flutter 把 IconData 改为 final class，
  # 0.2.7 上游未修，会编译失败）。改成纯 IconData 常量，见 third_party/tdesign_flutter。
  tdesign_flutter:
    path: third_party/tdesign_flutter
dependency_overrides:
  # vendored 的 third_party/flutter_qjs 已放宽 ffi 约束为 >=1.0.0 <3.0.0，
  # 与项目 ffi ^2.2.0 兼容，无需 override。

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 微软商店打包：dart run msix:create 生成 .msix（Store 代签）
  msix: ^3.16.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/mpv/shaders/

# ============================================================
# 微软商店 MSIX 打包配置
# CI 里 `dart run msix:create --version <x.x.x.0>` 打包已构建的 Release 目录。
# store: true → 产出未签名 .msix，由商店代签上传。
#
# ⚠️ 上架前把下面 3 个 TODO 换成 Partner Center 里保留应用后分配的值：
#   合作伙伴中心 → 你的应用 → 产品管理 → 产品标识
#     publisher            = 那里的 "发布者(Publisher)"，形如 CN=ABCD1234-...
#     publisher_display_name = "发布者显示名称"
#     identity_name        = "包/标识/名称"，形如 12345MyPublisher.0Player
# 换之前 CI 也能打出 .msix（用占位值），只是不能真正上传到商店。
# ============================================================
msix_config:
  display_name: 0Player
  publisher_display_name: 0Player          # TODO: 换成 Partner Center 的发布者显示名称
  identity_name: 0Player.App               # TODO: 换成 Partner Center 分配的包标识名称
  publisher: CN=0Player                    # TODO: 换成 Partner Center 分配的 CN=... 串
  msix_version: 1.0.0.0                     # 4 段，末段(revision)必须为 0；CI 用 --version 覆盖递增
  logo_path: assets/images/app_icon_source.png
  # 联网 + 局域网(连 LAN 上的 Emby / 手机扫码遥控内置服务)
  capabilities: internetClient, privateNetworkClientServer
  store: true


